<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>遥感图像垃圾倾倒研判</title>
  <style>
    :root{--ink:#17211d;--muted:#65736c;--line:#d9dfdb;--paper:#f5f7f5;--white:#fff;--green:#176a4a;--green2:#0f5038;--amber:#b86a12;--red:#b43c32}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font:15px/1.5 system-ui,-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;letter-spacing:0}.top{height:68px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center}.top-inner,.layout{width:min(1180px,calc(100% - 32px));margin:auto}.brand{display:flex;align-items:center;gap:12px;font-weight:720;font-size:18px}.mark{width:34px;height:34px;border-radius:6px;background:var(--green);display:grid;place-items:center;color:white}.subtitle{color:var(--muted);font-size:13px;font-weight:400;margin-left:4px}.layout{display:grid;grid-template-columns:380px 1fr;gap:24px;padding:28px 0 48px}.panel{background:#fff;border:1px solid var(--line);border-radius:8px}.panel-head{padding:18px 20px;border-bottom:1px solid var(--line)}.panel-head h2{font-size:16px;margin:0}.panel-body{padding:20px}.section-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;margin:0 0 12px}.field{margin-bottom:15px}label{display:block;font-size:13px;font-weight:650;margin-bottom:6px}select,input,textarea{width:100%;border:1px solid #cbd3ce;border-radius:6px;padding:0 11px;background:#fff;color:var(--ink);font:inherit}select,input{height:42px}textarea{height:128px;padding:10px 11px;resize:vertical;line-height:1.55}input:focus,select:focus,textarea:focus{outline:2px solid #b8dacb;border-color:var(--green)}.hint{font-size:11px;color:var(--muted);margin-top:5px}.key-wrap{position:relative}.key-wrap input{padding-right:64px}.text-btn{position:absolute;right:5px;top:5px;height:32px;border:0;background:transparent;color:var(--green);font-weight:650;cursor:pointer}.divider{border:0;border-top:1px solid var(--line);margin:22px 0}.drop{min-height:166px;border:1.5px dashed #aebbb4;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:18px;cursor:pointer;background:#fafbfa}.drop.drag{border-color:var(--green);background:#f0f7f3}.drop strong{margin-top:8px}.drop span{font-size:12px;color:var(--muted);margin-top:3px}.drop svg{color:var(--green)}#file{display:none}.file-name{margin-top:9px;font-size:12px;color:var(--muted);overflow-wrap:anywhere}.primary{height:46px;width:100%;border:0;border-radius:6px;background:var(--green);color:#fff;font:650 15px inherit;cursor:pointer;margin-top:16px}.primary:hover{background:var(--green2)}.primary:disabled{opacity:.45;cursor:not-allowed}.workspace{min-width:0}.preview{height:480px;background:#e8ece9;display:grid;place-items:center;overflow:hidden}.preview img{width:100%;height:100%;object-fit:contain;display:none}.empty{text-align:center;color:var(--muted)}.empty svg{opacity:.5}.result{margin-top:20px;display:none}.result.show{display:block}.result-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.badge{display:inline-flex;align-items:center;border-radius:4px;padding:4px 8px;font-size:12px;font-weight:700}.badge.risk{color:var(--red);background:#fbecea}.badge.clear{color:var(--green);background:#e7f3ed}.confidence{font-size:13px;color:var(--muted)}.result h3{font-size:20px;margin:10px 0 4px}.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}.result-box{border-top:1px solid var(--line);padding-top:14px}.result-box h4{font-size:13px;margin:0 0 6px}.result-box p{color:#44514b;margin:0;white-space:pre-wrap}.notice{margin-top:18px;background:#fff8e9;border-left:3px solid var(--amber);padding:11px 13px;color:#71501e;font-size:12px}.loading{display:none;align-items:center;gap:9px;justify-content:center}.spinner{width:17px;height:17px;border:2px solid #ffffff66;border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.error{display:none;margin-top:12px;padding:10px;background:#fbecea;color:#8e3029;border-radius:5px;font-size:13px}@media(max-width:850px){.layout{grid-template-columns:1fr}.preview{height:360px}.subtitle{display:none}}@media(max-width:520px){.top-inner,.layout{width:min(100% - 20px,1180px)}.layout{padding-top:14px;gap:14px}.result-grid{grid-template-columns:1fr}.preview{height:300px}}
  </style>
</head>
<body>
  <header class="top"><div class="top-inner"><div class="brand"><span class="mark">⌖</span>遥感图像垃圾倾倒研判 <span class="subtitle">多模态视觉辅助分析工具</span></div></div></header>
  <main class="layout">
    <aside class="panel">
      <div class="panel-head"><h2>分析配置</h2></div>
      <div class="panel-body">
        <p class="section-label">模型服务</p>
        <div class="field"><label for="provider">服务商</label><select id="provider"><option value="aliyun">阿里云百炼</option><option value="openai">OpenAI</option><option value="custom">自定义兼容接口</option></select></div>
        <div class="field"><label for="baseUrl">Base URL</label><input id="baseUrl" value="https://dashscope.aliyuncs.com/compatible-mode/v1" autocomplete="url"></div>
        <div class="field"><label for="model">多模态模型</label><input id="model" value="qwen3-vl-plus" autocomplete="off"></div>
        <div class="field"><label for="apiKey">API Key</label><div class="key-wrap"><input id="apiKey" type="password" placeholder="仅用于本次请求" autocomplete="off"><button class="text-btn" id="toggleKey" type="button">显示</button></div></div>
        <div class="field"><label for="prompt">分析提示词</label><textarea id="prompt" maxlength="4000">你是一位专业的卫星图像分析专家，专门识别垃圾倾倒后的地点。
垃圾倾倒后的地方的一些典型特征: 
1、垃圾堆位于公路附近或者道路的尽头(车辆开过去倾倒，倾倒后车辆离开)。
2、不和居住区/医院/工厂/学校等建筑在一起，因为如果有附近居民会举报
3、偷偷进行，倾倒位置不会出现新的类似道路施工/建筑施工的痕迹
只从上面3点来判断是否为垃圾倾倒地点。不要考虑其他因素。</textarea><div class="hint">本次会话临时生效，刷新页面后恢复默认内容</div></div>
        <hr class="divider">
        <p class="section-label">待分析图片</p>
        <div class="drop" id="drop" role="button" tabindex="0">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 16.5V19a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-2.5M12 4v11m-4-7 4-4 4 4"/></svg>
          <strong>选择或拖入遥感图片</strong><span>JPG、PNG、WebP，最大 10MB</span><div class="file-name" id="fileName"></div>
        </div>
        <input id="file" type="file" accept="image/jpeg,image/png,image/webp">
        <button class="primary" id="submit" disabled><span class="normal">开始研判</span><span class="loading"><i class="spinner"></i>模型分析中</span></button>
        <div class="error" id="error"></div>
      </div>
    </aside>
    <section class="workspace">
      <div class="panel">
        <div class="panel-head"><h2>图像预览</h2></div>
        <div class="preview"><div class="empty" id="empty"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="m4 17 5-4 4 3 3-2 4 3"/></svg><div>尚未选择图片</div></div><img id="preview" alt="待分析图片预览"></div>
      </div>
      <div class="panel result" id="result">
        <div class="panel-body">
          <div class="result-head"><div><span class="badge" id="badge"></span><h3 id="title"></h3></div><div class="confidence" id="confidence"></div></div>
          <div class="result-grid"><div class="result-box"><h4>模型判断依据</h4><p id="analysis"></p></div><div class="result-box"><h4>局限与复核建议</h4><p id="limitations"></p></div></div>
          <div class="notice">此结果由多模态模型生成，仅用于辅助筛查，不能替代现场核查或作为执法结论。</div>
        </div>
      </div>
    </section>
  </main>
  <script>
    const presets={aliyun:{url:'https://dashscope.aliyuncs.com/compatible-mode/v1',model:'qwen3-vl-plus'},openai:{url:'https://api.openai.com/v1',model:'gpt-4.1-mini'}};
    const $=id=>document.getElementById(id), provider=$('provider'),baseUrl=$('baseUrl'),model=$('model'),apiKey=$('apiKey'),prompt=$('prompt'),file=$('file'),drop=$('drop'),submit=$('submit');let selected=null,previewUrl=null;
    provider.onchange=()=>{const p=presets[provider.value];if(p){baseUrl.value=p.url;model.value=p.model}else{baseUrl.focus()}};
    $('toggleKey').onclick=()=>{const show=apiKey.type==='password';apiKey.type=show?'text':'password';$('toggleKey').textContent=show?'隐藏':'显示'};
    const choose=()=>file.click();drop.onclick=choose;drop.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();choose()}};
    file.onchange=()=>setFile(file.files[0]);['dragenter','dragover'].forEach(n=>drop.addEventListener(n,e=>{e.preventDefault();drop.classList.add('drag')}));['dragleave','drop'].forEach(n=>drop.addEventListener(n,e=>{e.preventDefault();drop.classList.remove('drag')}));drop.ondrop=e=>setFile(e.dataTransfer.files[0]);
    function setFile(f){$('error').style.display='none';if(!f)return;if(!['image/jpeg','image/png','image/webp'].includes(f.type)||f.size>10*1024*1024){showError('请选择 10MB 以内的 JPG、PNG 或 WebP 图片');return}selected=f;$('fileName').textContent=f.name;if(previewUrl)URL.revokeObjectURL(previewUrl);previewUrl=URL.createObjectURL(f);$('preview').src=previewUrl;$('preview').style.display='block';$('empty').style.display='none';submit.disabled=false;$('result').classList.remove('show')}
    function showError(msg){$('error').textContent=msg;$('error').style.display='block'}
    submit.onclick=async()=>{if(!selected||!apiKey.value.trim()||!prompt.value.trim()){showError('请先选择图片，并填写 API Key 和分析提示词');return}submit.disabled=true;submit.querySelector('.normal').style.display='none';submit.querySelector('.loading').style.display='flex';$('error').style.display='none';const data=new FormData();data.append('file',selected);data.append('api_key',apiKey.value.trim());data.append('base_url',baseUrl.value.trim());data.append('model',model.value.trim());data.append('prompt',prompt.value.trim());try{const res=await fetch('/api/detect',{method:'POST',body:data});const body=await res.json();if(!res.ok)throw new Error(body.detail||'分析失败');const risk=body.is_dumping;$('badge').className='badge '+(risk?'risk':'clear');$('badge').textContent=risk?'发现疑似风险':'未发现明显风险';$('title').textContent=risk?'建议优先安排人工复核':'当前图像未见明显倾倒特征';$('confidence').textContent=Number.isInteger(body.confidence)?`模型置信度 ${body.confidence}%`:'原始模型未返回置信度';$('analysis').textContent=body.analysis;$('limitations').textContent=body.limitations;$('result').classList.add('show');$('result').scrollIntoView({behavior:'smooth',block:'nearest'})}catch(e){showError(e.message)}finally{submit.disabled=false;submit.querySelector('.normal').style.display='inline';submit.querySelector('.loading').style.display='none'}};
  </script>
</body>
</html>
